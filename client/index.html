<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公交乘客投诉反馈平台</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
      a { text-decoration: none; color: #1890ff; }

      /* 布局 */
      .app-header { background: linear-gradient(135deg, #1890ff, #096dd9); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
      .app-header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
      .header-right { display: flex; align-items: center; gap: 16px; }
      .header-right span { font-size: 14px; opacity: 0.9; }
      .header-right .role-badge { background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 12px; font-size: 12px; }
      .nav-links { display: flex; gap: 8px; }
      .nav-links a, .nav-links button { color: #fff; background: none; border: 1px solid rgba(255,255,255,0.3); padding: 4px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .nav-links a:hover, .nav-links button:hover { background: rgba(255,255,255,0.15); }
      .nav-links a.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.6); }

      .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }

      /* 卡片 */
      .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
      .card h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; color: #1a1a1a; }
      .card h3 { font-size: 16px; margin-bottom: 12px; color: #333; }

      /* 表单 */
      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #555; }
      .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; outline: none; }
      .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
      .form-group textarea { resize: vertical; min-height: 100px; }

      .btn { display: inline-block; padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
      .btn-primary { background: #1890ff; color: #fff; }
      .btn-primary:hover { background: #40a9ff; }
      .btn-primary:disabled { background: #d9d9d9; cursor: not-allowed; }
      .btn-success { background: #52c41a; color: #fff; }
      .btn-success:hover { background: #73d13d; }
      .btn-warning { background: #faad14; color: #fff; }
      .btn-warning:hover { background: #ffc53d; }
      .btn-sm { padding: 4px 12px; font-size: 12px; }
      .btn-block { width: 100%; text-align: center; }

      /* 表格 */
      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #f0f0f0; }
      th { background: #fafafa; font-weight: 600; color: #555; white-space: nowrap; }
      tr:hover td { background: #f9fbff; }

      /* 状态标签 */
      .status-tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
      .status-pending { background: #fff7e6; color: #d48806; border: 1px solid #ffe58f; }
      .status-processing { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
      .status-resolved { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }

      /* 类型标签 */
      .type-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; background: #f0f0f0; color: #666; }

      /* 登录/注册 */
      .auth-page { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 56px); }
      .auth-card { width: 400px; }
      .auth-card .card { padding: 32px; }
      .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #f0f0f0; }
      .auth-tabs span { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 15px; color: #999; transition: all 0.2s; }
      .auth-tabs span.active { color: #1890ff; border-bottom: 2px solid #1890ff; margin-bottom: -2px; }
      .error-msg { color: #ff4d4f; font-size: 13px; margin-bottom: 12px; padding: 8px 12px; background: #fff2f0; border: 1px #ffccc7 solid; border-radius: 4px; }

      /* 星级评分 */
      .star-rating { display: flex; gap: 4px; }
      .star { font-size: 28px; cursor: pointer; color: #d9d9d9; transition: color 0.15s; user-select: none; }
      .star.active { color: #faad14; }
      .star:hover { color: #ffc53d; }

      /* 工单详情 */
      .detail-row { display: flex; margin-bottom: 12px; }
      .detail-label { width: 100px; color: #999; font-size: 14px; flex-shrink: 0; }
      .detail-value { flex: 1; font-size: 14px; }

      /* 进度条 */
      .progress-bar { display: flex; align-items: center; margin: 24px 0; }
      .progress-step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
      .progress-dot { width: 32px; height: 32px; border-radius: 50%; background: #d9d9d9; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 600; z-index: 1; }
      .progress-dot.done { background: #52c41a; }
      .progress-dot.current { background: #1890ff; }
      .progress-step span { margin-top: 8px; font-size: 12px; color: #999; }
      .progress-step span.active { color: #1890ff; font-weight: 500; }
      .progress-line { flex: 1; height: 3px; background: #d9d9d9; margin: 0 -10px; margin-bottom: 24px; }
      .progress-line.done { background: #52c41a; }

      /* 统计卡片 */
      .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
      .stat-item { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
      .stat-item .num { font-size: 32px; font-weight: 700; color: #1890ff; }
      .stat-item .label { font-size: 13px; color: #999; margin-top: 4px; }

      /* 图表区域 */
      .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .chart-grid .card { min-height: 300px; }
      .bar-chart { display: flex; flex-direction: column; gap: 8px; }
      .bar-row { display: flex; align-items: center; gap: 10px; }
      .bar-label { width: 80px; font-size: 13px; text-align: right; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .bar-track { flex: 1; height: 24px; background: #f5f5f5; border-radius: 4px; overflow: hidden; }
      .bar-fill { height: 100%; background: linear-gradient(90deg, #1890ff, #40a9ff); border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; }
      .bar-fill span { font-size: 12px; color: #fff; font-weight: 500; }
      .bar-count { width: 40px; font-size: 13px; color: #999; text-align: left; }

      /* 满意度分布 */
      .sat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
      .sat-label { width: 50px; font-size: 13px; color: #666; text-align: right; }
      .sat-bar { flex: 1; height: 20px; background: #f5f5f5; border-radius: 4px; overflow: hidden; }
      .sat-fill { height: 100%; background: linear-gradient(90deg, #faad14, #ffc53d); border-radius: 4px; }
      .sat-count { width: 30px; font-size: 13px; color: #999; }

      /* 筛选栏 */
      .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
      .filter-bar select { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; outline: none; }
      .filter-bar select:focus { border-color: #1890ff; }

      /* 空状态 */
      .empty-state { text-align: center; padding: 48px 0; color: #bbb; }
      .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
      .empty-state p { font-size: 14px; }

      /* 回复区域 */
      .reply-section { background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 8px; padding: 16px; margin-top: 16px; }
      .reply-section h4 { color: #52c41a; margin-bottom: 8px; font-size: 14px; }
      .reply-section p { font-size: 14px; color: #333; }

      /* 弹窗 */
      .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); display: flex; justify-content: center; align-items: center; z-index: 1000; }
      .modal { background: #fff; border-radius: 8px; padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
      .modal h3 { margin-bottom: 16px; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

      /* 响应式 */
      @media (max-width: 768px) {
        .stat-grid { grid-template-columns: repeat(2, 1fr); }
        .chart-grid { grid-template-columns: 1fr; }
        .auth-card { width: 90vw; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
